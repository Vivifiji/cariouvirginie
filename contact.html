  height: 100%;

}

header h1 {
  position: relative;

    }

      margin: 20px auto;
      width: 60%;
      border-radius: 10px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    .card:hover {
  transform: translateY(-5px);
  transition: 0.3s;
}

    a {
      color: #3498db;
      text-decoration: none;
      font-weight: bold;
    }

    a:hover {
      text-decoration: underline;
    }
