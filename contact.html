<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%238000c8' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><rect x='2' y='3' width='20' height='14' rx='2'/><path d='M8 21h8M12 17v4'/></svg>">
  <title>Contact - CARIOU Virginie</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f4f6f8;
      margin: 0;
      padding: 0;
      text-align: center;
    }

    header {
      background-image: url('contact.jpg');
      background-size: cover;
      background-position: center;
      height: 250px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    header::before {
      content: "";
      position: absolute;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.1);
    }

    header h1 {
      position: relative;
      color: white;
      font-size: 3em;
      text-shadow: 2px 2px 5px black;
    }

    main {
      padding: 40px;
    }

    .card {
      background: white;
      padding: 30px;
      margin: 20px auto;
      width: 60%;
      border-radius: 10px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.2);

      /* Animation */
      opacity: 0;
      transform: translateY(20px);
      animation: fadeIn 0.8s ease forwards;
    }

    /* Animation */
    @keyframes fadeIn {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Effet cascade */
    .card:nth-child(1) {
      animation-delay: 0.2s;
    }

    .card:nth-child(2) {
      animation-delay: 0.4s;
    }

    .card:nth-child(3) {
      animation-delay: 0.6s;
    }

    .card:nth-child(4) {
      animation-delay: 0.8s;
    }

    /* Effet au survol */
    .card:hover {
      transform: translateY(-5px);
      transition: 0.3s;
    }

    a {
      color: #3498db;
      text-decoration: none;
      font-weight: bold;
    }

    a:hover {
      text-decoration: underline;
    }

  </style>
</head>

<body>

<header>
  <h1>Contact</h1>
</header>

<main>

<div class="card">
  <h2>📧 Email</h2>
  <p>
    <a href="mailto:Virginie04.c@gmail.com">Virginie04.c@gmail.com</a>
  </p>
</div>

<div class="card">
  <h2>💼 LinkedIn</h2>
  <p>
    <a href="https://www.linkedin.com/in/virginie-alternance-technicien-helpdesk" target="_blank">
      Voir mon profil LinkedIn
    </a>
  </p>
</div>

<div class="card">
  <h2>📄 Mon CV</h2>
  <p>
    <a href="cv-cariou-virginie.pdf" target="_blank">Voir mon CV</a>
  </p>
</div>

<div class="card">
  <a href="index.html">⬅ Retour à l'accueil</a>
</div>

</main>

</body>
</html>
